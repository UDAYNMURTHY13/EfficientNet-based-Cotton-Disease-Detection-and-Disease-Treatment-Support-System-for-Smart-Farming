version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cottoncare_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cottoncare_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cottoncare_password}
      POSTGRES_DB: ${POSTGRES_DB:-cottoncare_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cottoncare_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cottoncare-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cottoncare_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cottoncare-network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cottoncare_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cottoncare_user}:${POSTGRES_PASSWORD:-cottoncare_password}@postgres:5432/${POSTGRES_DB:-cottoncare_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MODEL_PATH: /app/models/cotton_model_final.keras
      UPLOAD_DIR: /app/uploads
    ports:
      - "8001:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "gunicorn app.main:app 
             --bind 0.0.0.0:8000 
             --workers 4 
             --worker-class uvicorn.workers.UvicornWorker 
             --timeout 120 
             --access-logfile - 
             --error-logfile -"
    networks:
      - cottoncare-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  cottoncare-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
