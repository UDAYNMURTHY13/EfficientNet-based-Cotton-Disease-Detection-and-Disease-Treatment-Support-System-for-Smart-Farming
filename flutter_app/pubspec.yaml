name: cotton_care_app
description: Cotton Disease Detection using AI with Flutter mobile app.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0

  # Camera & Image
  image_picker: ^1.0.4
  camera: ^0.10.5+5
  image: ^4.1.3

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.1

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  # State Management
  provider: ^6.1.0
  riverpod: ^2.4.9

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3

  # JSON Serialization
  json_annotation: ^4.8.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  connectivity_plus: ^5.0.1
  url_launcher: ^6.2.1

  # Animations & Loading
  lottie: ^2.7.0
  shimmer: ^3.0.0

  # Firebase (optional for push notifications)
  firebase_core: ^2.24.2
  firebase_messaging: ^14.6.8

  # Analytics
  firebase_analytics: ^10.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

